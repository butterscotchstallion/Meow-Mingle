# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  cov:
    desc: Run test coverage
    cmds:
      - cargo llvm-cov nextest --color always

  covhtml:
    desc: Run test coverage and open HTML report
    cmds:
      - cargo llvm-cov nextest --html --open

  genapi:
    desc: Generate API
    cmds:
      - echo "Fetching OpenAPI spec from running server..."
      - curl -s http://127.0.0.1:3000/api-docs/openapi.json -o openapi.json
      - echo "Generating TypeScript client..."
      - cd ui/src && npx @hey-api/openapi-ts
      - echo "Done!"