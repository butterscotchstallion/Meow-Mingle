# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  dev:
    desc: Run the API server with debug logging
    cmds:
      - RUST_LOG=meow_mingle=debug,axum=debug,tower_http=debug cargo run

  cov:
    desc: Run test coverage
    cmds:
      - cargo llvm-cov --all-targets nextest --color always

  covhtml:
    desc: Run test coverage and open HTML report
    cmds:
      - cargo llvm-cov --all-targets nextest --html --open

  genapi:
    desc: Generate API
    cmds:
      - cargo p
      - echo "Fetching OpenAPI spec from running server..."
      - curl -s http://127.0.0.1:3000/api-docs/openapi.json -o openapi.json
      - echo "Generating TypeScript client..."
      - cd ui/src && npx @hey-api/openapi-ts
      - echo "Done!"
